gitlab_url: "https://gitlab.example.com"
project_id: 12345
default_branch: "main"
gitlab_token_env: "GITLAB_TOKEN"

# Existing local checkout of the target repository.
target_repo_path: "../target-repo"
target_repo_url: null
target_repo_ref: null
clone_target_repo: false
clone_depth: 0
reject_embedded_git_credentials: true

# AgentLab writes run artifacts and audit.jsonl below this directory.
workspace_root: "./runs"
audit_file: "audit.jsonl"

ollama:
  base_url: "http://localhost:11434"
  models:
    default: "qwen3.6:35b"
    planner: "qwen3.6:35b"
    implementer: "qwen3.6:35b"
    mr_agent: "qwen3.6:35b"
    review_quality: "qwen3.6:35b"
    review_security: "qwen3.6:35b"

allowed_commands:
  - "python -m pytest"
  - "pytest"
  - "npm test"
  - "pnpm test"
  - "go test ./..."
  - "cargo test"
  - "docker build"
  - "docker compose config"
  - "docker compose up"
  - "docker compose logs"
  - "docker compose down"
  - "trivy"
  - "gitleaks"
  - "semgrep"
  - "bandit"
  - "npm audit"

forbidden_commands:
  - "rm -rf"
  - "git reset --hard"
  - "git push --force"
  - "docker run --privileged"
  - "docker compose up --privileged"

protected_paths:
  - ".gitlab-ci.yml"
  - "infra/prod"
  - "terraform/prod"
  - "secrets"
allowed_task_types: []
forbidden_task_types: []
required_test_commands: []
repo_policy_file: ".agentlab.yaml"
require_repo_policy_for_write: false

repo_index_ignore:
  - ".git"
  - ".venv"
  - "venv"
  - "node_modules"
  - "dist"
  - "build"
  - ".pytest_cache"
  - "__pycache__"
  - ".mypy_cache"
  - ".ruff_cache"
  - "coverage"
max_index_files: 5000
max_index_file_bytes: 250000
max_index_todos: 200

max_changed_files: 20
max_added_lines: 500
max_deleted_lines: 500
max_risk_score_for_merge: 60
max_risk_score_for_direct_main_push: 10

auto_merge_enabled: false
direct_main_push_enabled: false
push_agent_branches_enabled: false
docker_build_enabled: true
docker_compose_enabled: true
require_two_reviewers: true
require_two_testers: true
command_timeout_seconds: 900
